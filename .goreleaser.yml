version: 2

project_name: simplx-toolkit

builds:
  - id: devdash
    main: ./cmd/local
    binary: devdash
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

  - id: maomao
    main: ./cmd/maomao
    binary: maomao
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - id: devdash
    builds:
      - devdash
    formats:
      - tar.gz
    name_template: "devdash_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: maomao
    builds:
      - maomao
    formats:
      - tar.gz
    name_template: "maomao_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: devdash
    ids:
      - devdash
    repository:
      owner: kimaguri
      name: homebrew-simplx-toolkit
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/kimaguri/simplx-toolkit"
    description: "Dev process dashboard TUI — launch, monitor, and manage local dev services"
    install: |
      bin.install "devdash"

  - name: maomao
    ids:
      - maomao
    repository:
      owner: kimaguri
      name: homebrew-simplx-toolkit
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/kimaguri/simplx-toolkit"
    description: "Multi-repo agent orchestrator — manage AI agents across git repositories"
    install: |
      bin.install "maomao"

release:
  github:
    owner: kimaguri
    name: simplx-toolkit
